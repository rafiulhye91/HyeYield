server {
    listen 80;
    server_name hyeyield.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hyeyield.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/hyeyield.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hyeyield.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;

    # React SPA static files
    root /var/www/hyeyield;
    index index.html;

    # Proxy FastAPI routes — auth, accounts, schwab, invest, logs, health, schedules
    location ~ ^/(auth|accounts|schwab|invest|logs|health|schedules)(/|$) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE endpoint — must not buffer and needs a long read timeout
    location /events {
        proxy_pass              http://127.0.0.1:8000;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      3600s;
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
    }

    # Never cache index.html so browsers always get the latest JS bundle
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    # React SPA — all other routes (including /redirect for OAuth callback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
