server {
    listen 80;
    server_name hyeyield.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hyeyield.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/hyeyield.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hyeyield.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # React SPA static files
    root /var/www/hyeyield;
    index index.html;

    # Proxy FastAPI routes — auth, accounts, schwab, invest, logs, health
    location ~ ^/(auth|accounts|schwab|invest|logs|health)(/|$) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA — all other routes (including /redirect for OAuth callback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
